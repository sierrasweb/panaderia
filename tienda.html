<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panadería El Buen Trigo - Pedidos Online</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Lora:ital,wght@0,600;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- 🎨 Variables y Estilos Generales (Panadería) --- */
:root {
    /* Paleta Panadería */
    --coffee: #4A3022; 
    --crust-gold: #D48C29; 
    --crust-gold-hover: #b8761f;
    --dough-light: #FDF9F1; 
    --white: #FFFFFF;
    --wa-green: #25D366;

    --bg-body: var(--dough-light);
    --bg-card: var(--white);
    --bg-input: var(--white);
    --borde-color: #E0D5C1;
    
    --texto-principal: var(--coffee);
    --texto-secundario: #665349;
    
    --rojo-cerrado: #E53935;
    
    --sombra-sutil: 0 4px 15px rgba(74, 48, 34, 0.05);
    --sombra-media: 0 8px 30px rgba(74, 48, 34, 0.08);
    --sombra-flotante: 0 15px 35px rgba(74, 48, 34, 0.15), 0 5px 15px rgba(74, 48, 34, 0.05);
    
    --radio-borde: 20px;
}

/* --- 🌙 Variables Modo Oscuro (Adaptado a tonos café oscuro) --- */
body.dark-mode {
    --bg-body: #2A1C14;
    --bg-card: #38261C;
    --bg-input: #4A3022;
    --borde-color: #5C3D2B;
    
    --texto-principal: #FDF9F1;
    --texto-secundario: #D48C29;
    
    --crust-gold: #E29F42;
    --crust-gold-hover: #D48C29;
    
    --sombra-sutil: 0 4px 15px rgba(0,0,0,0.3);
    --sombra-media: 0 8px 30px rgba(0,0,0,0.5);
    --sombra-flotante: 0 15px 35px rgba(0,0,0,0.6);
}

*, *::before, *::after {
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
}

body { 
    font-family: 'Nunito', sans-serif; 
    margin: 0; 
    background-color: var(--bg-body);
    color: var(--texto-principal);
    line-height: 1.6;
    overflow-x: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
}

/* Tipografía para Títulos */
h1, h2, h3, .titulo-seccion {
    font-family: 'Lora', serif;
}

/* --- BANNER INFORMATIVO --- */
.banner-top {
    background: linear-gradient(90deg, var(--crust-gold), var(--crust-gold-hover));
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    text-align: center;
    padding: 10px 45px 10px 15px;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 40px;
    transition: all 0.3s ease;
}

.banner-contenido {
    display: flex;
    align-items: center;
    gap: 8px;
    line-height: 1.3;
}

.btn-cerrar-banner {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.1);
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    line-height: 1;
    padding-bottom: 2px;
}
.btn-cerrar-banner:hover { background: rgba(0,0,0,0.3); }

/* --- Header --- */
header { 
    background: var(--bg-card);
    color: var(--coffee); 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 15px 5%;
    box-shadow: var(--sombra-media);
    position: sticky; 
    top: 0; 
    z-index: 50;
    transition: background-color 0.3s ease;
}

.marca-container {
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
}

.logo-negocio {
    height: 50px;
    width: 50px;
    object-fit: cover;
    border-radius: 50%;
    box-shadow: var(--sombra-sutil);
}

header h1 { 
    margin: 0; 
    font-size: 1.8rem; 
    color: var(--crust-gold);
    font-weight: 600;
    line-height: 1.2;
}

.header-controles {
    display: flex;
    align-items: center;
    gap: 15px; 
}

/* --- Cartel de Estado Profesional --- */
.estado-local {
    padding: 8px 18px;
    border-radius: 50px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--texto-principal);
    background: var(--bg-body);
    box-shadow: var(--sombra-sutil);
    border: 1px solid var(--borde-color);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    white-space: nowrap;
}

.estado-local::before {
    content: '';
    display: block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background-color: #00C853;
    box-shadow: 0 0 8px rgba(0, 200, 83, 0.6);
    animation: pulso-abierto 2s infinite;
}

.estado-local.cerrado {
    color: var(--rojo-cerrado);
    background: rgba(229, 57, 53, 0.1);
    border-color: rgba(229, 57, 53, 0.2);
}

.estado-local.cerrado::before {
    background-color: var(--rojo-cerrado);
    box-shadow: none;
    animation: none;
}

@keyframes pulso-abierto {
    0% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0.4); }
    70% { box-shadow: 0 0 0 6px rgba(0, 200, 83, 0); }
    100% { box-shadow: 0 0 0 0 rgba(0, 200, 83, 0); }
}

.btn-header { 
    border: none; 
    padding: 10px 22px; 
    border-radius: 50px; 
    cursor: pointer; 
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    font-size: 1rem;
}

.btn-horarios {
    background: var(--bg-body);
    color: var(--texto-principal);
    border: 1px solid var(--borde-color);
}
.btn-horarios:hover {
    background: var(--borde-color);
}

.btn-carrito { 
    background: var(--crust-gold); 
    color: white; 
    box-shadow: 0 4px 10px rgba(212, 140, 41, 0.3);
}
.btn-carrito:hover { 
    background: var(--crust-gold-hover); 
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(212, 140, 41, 0.4);
}
.btn-carrito.pop { animation: pop 0.3s ease; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

.btn-carrito span { 
    font-weight: 800;
    background: rgba(0, 0, 0, 0.15); 
    padding: 2px 10px; 
    border-radius: 20px; 
    font-size: 0.95rem;
}

/* --- Layout Principal --- */
.tienda-container { 
    display: flex; 
    gap: 35px;
    margin: 40px auto; 
    max-width: 1200px; 
    padding: 0 25px;
    align-items: flex-start;
}

/* Sidebar Categorías */
.categorias-sidebar { 
    flex: 0 0 240px; 
    background: var(--bg-card); 
    padding: 25px; 
    border-radius: var(--radio-borde); 
    box-shadow: var(--sombra-media);
    height: fit-content;
    position: sticky; 
    top: 110px; 
    border: 1px solid var(--borde-color);
}
.categorias-sidebar h2 { 
    margin-top: 0; 
    color: var(--crust-gold); 
    border-bottom: 2px solid var(--borde-color);
    padding-bottom: 15px;
    margin-bottom: 15px;
    font-size: 1.4rem;
}
.categorias-sidebar ul { list-style: none; padding: 0; margin: 0;}
.categorias-sidebar li { margin-bottom: 8px; }
.categorias-sidebar li a { 
    display: block; 
    padding: 12px 18px; 
    text-decoration: none; 
    color: var(--texto-secundario);
    border-radius: 12px; 
    transition: all 0.2s ease;
    font-weight: 600;
    font-family: 'Nunito', sans-serif;
}
.categorias-sidebar li a:hover { 
    background: var(--bg-body); 
    color: var(--crust-gold);
    transform: translateX(5px);
}
.categorias-sidebar li a.activo { 
    background: var(--crust-gold); 
    color: white; 
    font-weight: 800;
    box-shadow: var(--sombra-sutil);
}

/* Área de Productos */
.productos-lista { flex: 1; min-width: 0; }

.header-filtros {
    background: var(--bg-card);
    padding: 20px;
    border-radius: var(--radio-borde);
    box-shadow: var(--sombra-sutil);
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
    border: 1px solid var(--borde-color);
}

.titulo-seccion {
    color: var(--texto-principal);
    font-size: 1.6rem;
    margin: 0;
    flex-grow: 1;
}

/* --- Contenedor de Filtros --- */
.controles-filtros {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    flex-grow: 1;
    justify-content: flex-end;
}

.select-categoria {
    padding: 12px 20px;
    border-radius: 30px;
    border: 2px solid var(--borde-color);
    background-color: var(--bg-input);
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    color: var(--texto-principal);
    font-size: 0.95rem;
    cursor: pointer;
    outline: none;
    min-width: 180px;
    appearance: none; 
    /* El icono de la flecha usa el color --crust-gold (#D48C29) */
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23D48C29%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat;
    background-position: right 15px top 50%;
    background-size: 12px auto;
    width: auto;
}
.select-categoria:focus {
    border-color: var(--crust-gold);
}

.buscador-input {
    padding: 12px 20px;
    border-radius: 30px;
    border: 2px solid var(--borde-color);
    background-color: var(--bg-input);
    color: var(--texto-principal);
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    outline: none;
    width: 200px;
    transition: all 0.3s;
}
.buscador-input:focus {
    border-color: var(--crust-gold);
    width: 220px;
}

.grid-productos { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
    gap: 30px; 
}

/* --- Tarjeta Producto --- */
.producto-card { 
    background: var(--bg-card); 
    border-radius: var(--radio-borde);
    padding: 25px; 
    text-align: center; 
    box-shadow: var(--sombra-media);
    border: 1px solid var(--borde-color);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
.producto-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--sombra-flotante);
    border-color: var(--crust-gold);
}

.producto-card .cinta-oferta {
    position: absolute;
    top: 12px; left: -32px;
    background: linear-gradient(45deg, var(--crust-gold), #FFC107);
    color: #fff;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    text-transform: uppercase;
    padding: 8px 45px;
    transform: rotate(-45deg);
    font-size: 0.8rem;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    z-index: 10;
}

.producto-card img {
    max-width: 100%; 
    height: 140px; 
    object-fit: cover;
    border-radius: 12px;
    margin: 0 auto 20px;
    display: block;
    box-shadow: var(--sombra-sutil);
}
.producto-card.sin-imagen { padding-top: 40px; }

.producto-card h3 { 
    font-size: 1.2rem; 
    margin: 10px 0; 
    color: var(--texto-principal);
    min-height: 45px; 
    display: flex; align-items: center; justify-content: center;
}
.producto-card .precio { 
    font-weight: 800; 
    font-family: 'Nunito', sans-serif;
    color: var(--crust-gold); 
    font-size: 1.5rem; 
    margin-bottom: 20px; 
    display: block;
}
.producto-card .btn-agregar { 
    background: var(--crust-gold);
    color: white; 
    border: none; 
    padding: 12px 15px; 
    border-radius: 50px; 
    cursor: pointer; 
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    width: 100%; 
    text-transform: uppercase;
    box-shadow: 0 4px 6px rgba(212, 140, 41, 0.2);
    font-size: 0.95rem;
    transition: all 0.3s ease;
}

.producto-card .btn-agregar:disabled { background: var(--borde-color); color: var(--texto-secundario); box-shadow: none; cursor: not-allowed; }

.producto-card .btn-agregar:hover:not(:disabled) { 
    background: var(--crust-gold-hover); 
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(212, 140, 41, 0.3); 
}

/* --- Modales --- */
.modal-overlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(42, 28, 20, 0.7); backdrop-filter: blur(5px);
    display: flex; justify-content: center; align-items: center; 
    visibility: hidden; opacity: 0; transition: all 0.3s ease; 
    z-index: 1000; 
}
.modal-overlay.visible { visibility: visible; opacity: 1; }
.modal-content { 
    background: var(--bg-card); padding: 35px; border-radius: 24px; 
    width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; 
    transform: scale(0.9); transition: all 0.3s;
    box-shadow: var(--sombra-flotante); position: relative;
    color: var(--texto-principal);
    border: 1px solid var(--borde-color);
}
.modal-overlay.visible .modal-content { transform: scale(1); }
.modal-close { position: absolute; top: 20px; right: 20px; background: var(--bg-body); border: 1px solid var(--borde-color); width: 35px; height: 35px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; color: var(--texto-principal); display: flex; align-items: center; justify-content: center; transition: all 0.2s;}
.modal-close:hover { background: var(--borde-color); }

/* --- Lista Horarios --- */
.lista-horarios { list-style: none; padding: 0; margin: 10px 0 0 0; display: flex; flex-direction: column; gap: 10px;}

.lista-horarios li { 
    display: grid; 
    grid-template-columns: 120px 1fr; 
    align-items: center;
    padding: 15px; 
    border-radius: 16px;
    background-color: var(--bg-body);
    border: 1px dashed var(--borde-color);
    transition: all 0.2s;
}

.horario-dia {
    font-weight: 700;
    color: var(--texto-secundario);
    text-transform: capitalize;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    display: flex; align-items: center; gap: 5px;
}
.horario-hora {
    font-size: 0.95rem;
    color: var(--texto-principal);
    line-height: 1.4;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
}
.lista-horarios li.dia-actual { 
    background-color: var(--bg-card); 
    border: 2px solid var(--crust-gold);
    box-shadow: var(--sombra-sutil);
}
.lista-horarios li.dia-actual .horario-dia {
    color: var(--crust-gold);
    font-weight: 800;
}
.badge-hoy {
    font-size: 0.7rem;
    background: var(--crust-gold);
    color: white;
    padding: 2px 6px;
    border-radius: 6px;
    margin-left: 5px;
    text-transform: uppercase;
    font-weight: 800;
}

.modal-carrito-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--borde-color); font-family: 'Nunito', sans-serif;}
.controles-cantidad { display: flex; align-items: center; gap: 8px; }
.controles-cantidad .btn-cantidad { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 1px solid var(--borde-color); background: var(--bg-body); color: var(--texto-principal); font-weight: bold; transition: all 0.2s;}
.controles-cantidad .btn-cantidad:hover { background: var(--borde-color); }

#form-cliente input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid var(--borde-color); border-radius: 12px; box-sizing: border-box; background: var(--bg-body); color: var(--texto-principal); font-family: 'Nunito', sans-serif; font-weight: 600;}
#form-cliente input:focus { outline: none; border-color: var(--crust-gold); }

.btn-whatsapp { background: var(--wa-green); color: white; padding: 16px; width: 100%; border: none; border-radius: 50px; cursor: pointer; font-weight: 800; font-size: 1.1rem; display: flex; justify-content: center; gap: 10px; align-items: center; font-family: 'Nunito', sans-serif; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); transition: all 0.3s;}
.btn-whatsapp:hover { background: #20BA56; transform: translateY(-2px); }

.btn-vaciar { background: none; border: none; color: var(--rojo-cerrado); font-size: 0.9rem; font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; text-decoration: underline; }

#toast { position: fixed; bottom: 30px; right: 30px; background: var(--coffee); color: white; padding: 16px 30px; border-radius: 50px; font-weight: 700; font-family: 'Nunito', sans-serif; opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 1001; transform: translateY(20px); box-shadow: var(--sombra-media); border: 1px solid rgba(255,255,255,0.1);}
#toast.show { opacity: 1; visibility: visible; transform: translateY(0); }

/* --- BOTONES FLOTANTES DISCRETOS --- */
.utilidades-container {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 900;
}

.btn-flotante {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: var(--bg-card); 
    color: var(--texto-principal);
    border: 1px solid var(--borde-color);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: all 0.3s ease;
    box-shadow: var(--sombra-media);
}

.btn-flotante:hover {
    transform: scale(1.1);
    background: var(--crust-gold);
    color: white;
    border-color: var(--crust-gold);
}

/* --- RESPONSIVE OPTIMIZADO PARA MÓVILES --- */
@media (max-width: 768px) {
    body { font-size: 14px; }
    .categorias-sidebar { display: none; }
    
    .banner-top {
        font-size: 0.85rem;
        padding: 8px 35px 8px 10px;
        text-align: left;
    }
    .banner-contenido { justify-content: center; }

    header { padding: 15px; flex-direction: column; gap: 15px;}
    .logo-negocio { width: 55px; height: 55px; } 
    header h1 { font-size: 1.6rem; margin-left: 0; text-align: center;}
    
    .header-controles { width: 100%; justify-content: center; flex-wrap: wrap; gap: 10px; }
    .btn-header { flex-grow: 1; justify-content: center; padding: 10px 12px; font-size: 0.9rem; }
    .estado-local { padding: 8px 12px; font-size: 0.85rem; }
    
    .tienda-container { flex-direction: column; margin: 20px auto; padding: 0 15px; gap: 15px;}

    .header-filtros { 
        padding: 20px; 
        gap: 15px; 
        flex-direction: column;
        align-items: stretch;
    }
    
    .titulo-seccion { 
        text-align: center; 
        font-size: 1.4rem; 
        width: 100%;
        margin-bottom: 5px;
    }
    
    .controles-filtros { 
        display: flex;
        flex-direction: column;
        gap: 12px; 
        width: 100%; 
    }
    
    .select-categoria, .buscador-input { 
        padding: 12px 15px; 
        height: 48px;
        font-size: 0.95rem; 
        width: 100% !important;
        min-width: 0 !important;
        max-width: none;
        margin: 0;
    }

    .buscador-input:focus { width: 100% !important; }

    .grid-productos { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
    
    .producto-card { padding: 15px; }
    .producto-card img { height: 110px; margin-bottom: 12px; }
    .producto-card h3 { font-size: 1.05rem; min-height: 40px; margin: 5px 0; line-height: 1.2; }
    .producto-card .precio { font-size: 1.25rem; margin-bottom: 12px; }
    .producto-card .btn-agregar { padding: 10px; font-size: 0.9rem; }
    .producto-card .cinta-oferta { font-size: 0.65rem; padding: 6px 40px; top: 12px; left: -35px; }

    .modal-content { padding: 25px 20px; width: 95%; }
    
    .utilidades-container { bottom: 15px; left: 15px; gap: 10px; }
    .btn-flotante { width: 40px; height: 40px; font-size: 1rem; }
}
</style>
</head>
<body>

<div id="banner-anuncios" class="banner-top">
    <div class="banner-contenido">

<script>
document.addEventListener('DOMContentLoaded', () => {

// --- 📢 CONFIGURACIÓN DEL BANNER ---
const TEXTO_BANNER = "📢 ¡Medialunas calientes todo el día! | 💳 Aceptamos Mercado Pago";

// --- CONFIGURACIÓN DE URLS ---
const params = new URLSearchParams(window.location.search);
const negocioActual = params.get('negocio') || 'verduleria_elfresquito1';
const WHATSAPP_NUMBER = '542664212722';

// ------------------------------------------------------------
// 👇👇 PEGA TU ENLACE DE GOOGLE MAPS AQUÍ ABAJO 👇👇
const URL_MAPS = 'https://maps.app.goo.gl/pt7gjU8kzede8FHQ8'; 
// ------------------------------------------------------------

const URL_SHEET_PRODUCTS = `https://script.google.com/macros/s/AKfycbxmrdId2-DIUd1hZSsYAJ4lpalK6XFMeQPHySrHqGljo079iOV0yhJ_iPrz9DA0G--P/exec?negocio=${negocioActual}`;
const URL_SHEET_REGISTRO = 'https://script.google.com/macros/s/AKfycbyofyN54TXZd4nm5zzJ8gmNDO8aPZ8tdOddKMUQHq6Y4paFkl371zRlNekiOP2YG3S6Ow/exec';
const URL_SHEET_HORARIOS = 'https://script.google.com/macros/s/AKfycbxvNRdU68PnP3jInuC0yhMntW5BJm3_NtcHsMacCck2xRt1G2hcateos4ZQP_Yf3-Rr/exec';

const STORAGE_KEY = 'carrito_buentrigo_v1';
const THEME_KEY = 'buentrigo_theme';

// Variables de Estado
let productos = [];
let carrito = [];
let negocioAbierto = false;
let horariosActivos = {}; 

// Mapa de días
const mapDias = {
    'lunes': 1, 'martes': 2, 'miercoles': 3, 'miércoles': 3, 
    'jueves': 4, 'viernes': 5, 'sabado': 6, 'sábado': 6, 'domingo': 0
};

// DOM Elements
const productosContainer = document.getElementById('productos-container');
const categoriasLista = document.getElementById('categorias-lista');
const selectCategoria = document.getElementById('select-categoria');
const loading = document.getElementById('loading');
const errorMsg = document.getElementById('error-msg');
const modal = document.getElementById('modal-carrito');
const modalHorarios = document.getElementById('modal-horarios');
const listaHorariosUL = document.getElementById('lista-horarios-dinamica'); 
const modalCarritoItemsContainer = document.getElementById('modal-carrito-items');
const totalHeader = document.getElementById('total-header');
const modalTotal = document.getElementById('modal-total');
const btnEnviarPedido = document.getElementById('btn-enviar-pedido');
const formCliente = document.getElementById('form-cliente');
const toast = document.getElementById('toast');
const btnVerCarrito = document.getElementById('btn-ver-carrito');
const indicadorEstado = document.getElementById('indicador-estado');
const buscador = document.getElementById('buscador');
const btnVaciar = document.getElementById('btn-vaciar-carrito');
const btnVerMapa = document.getElementById('btn-ver-mapa'); 

// Botones Flotantes y Banner
const btnToggleTema = document.getElementById('btn-toggle-tema');
const btnCompartir = document.getElementById('btn-compartir');
const elBanner = document.getElementById('banner-anuncios');
const elTextoBanner = document.getElementById('texto-banner');
const btnCerrarBanner = document.getElementById('btn-cerrar-banner');

// Helpers
const formatPrice = (p) => `$${Number(p).toLocaleString('es-AR', {minimumFractionDigits: 2})}`;
function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),3000); }
function parsearHora(textoHora) {
    if(!textoHora) return [0,0];
    const partes = textoHora.toString().split(':');
    return [parseInt(partes[0]), parseInt(partes[1] || 0)];
}

// --- LOGICA DEL BANNER ---
if(elTextoBanner) elTextoBanner.textContent = TEXTO_BANNER;
if(btnCerrarBanner) {
    btnCerrarBanner.addEventListener('click', () => {
        elBanner.style.display = 'none';
    });
}

// --- LOGICA DEL BOTÓN MAPA ---
if(btnVerMapa) {
    btnVerMapa.addEventListener('click', () => {
        window.open(URL_MAPS, '_blank');
    });
}

// --- LOGICA DE TEMA OSCURO ---
function aplicarTema(esOscuro) {
    if(esOscuro) {
        document.body.classList.add('dark-mode');
        btnToggleTema.textContent = "☀️"; 
    } else {
        document.body.classList.remove('dark-mode');
        btnToggleTema.textContent = "🌙"; 
    }
}

const temaGuardado = localStorage.getItem(THEME_KEY);
if(temaGuardado === 'dark') {
    aplicarTema(true);
}

btnToggleTema.addEventListener('click', () => {
    const esOscuro = document.body.classList.toggle('dark-mode');
    if(esOscuro) {
        btnToggleTema.textContent = "☀️";
        localStorage.setItem(THEME_KEY, 'dark');
    } else {
        btnToggleTema.textContent = "🌙";
        localStorage.setItem(THEME_KEY, 'light');
    }
});

// --- LOGICA COMPARTIR ---
btnCompartir.addEventListener('click', async () => {
    const shareData = {
        title: 'Panadería "El Buen Trigo"',
        text: '¡Mirá los productos frescos que tiene El Buen Trigo! Pedi online:',
        url: window.location.href
    };

    if (navigator.share) {
        try {
            await navigator.share(shareData);
        } catch (err) {
            console.log('Error al compartir', err);
        }
    } else {
        try {
            await navigator.clipboard.writeText(window.location.href);
            showToast("🔗 ¡Enlace copiado!");
        } catch (err) {
            prompt("Copia este enlace para compartir:", window.location.href);
        }
    }
});

// --- LÓGICA DE HORARIOS DINÁMICA ---
async function cargarHorariosRemotos() {
    try {
        const response = await fetch(URL_SHEET_HORARIOS);
        const data = await response.json();
        
        listaHorariosUL.innerHTML = '';
        horariosActivos = {};

        let listaDatos = Array.isArray(data) ? data : (data.horarios || []);

        listaDatos.forEach(item => {
            const diaRaw = item.dia || "";
            const diaIndex = mapDias[diaRaw.toLowerCase().trim()];
            let textoVisual = "";
            let rangosLogicos = []; 
            let partesTexto = [];

            if (item.cerrado === true || String(item.cerrado).toUpperCase() === "SI" || String(item.cerrado).toUpperCase() === "TRUE") {
                textoVisual = `<span style="color:var(--rojo-cerrado); font-weight:800; background:rgba(229, 57, 53, 0.1); padding:4px 10px; border-radius:6px; font-size:0.85rem;">CERRADO</span>`;
                const motivo = item.motivo ? String(item.motivo).trim() : "";
                if(motivo.length > 0) textoVisual += `<div style="font-size: 0.85rem; color: var(--rojo-cerrado); margin-top:6px;">${motivo}</div>`;
            } else {
                if (item.m_inicio && item.m_fin && item.m_inicio.toString() !== "") {
                    partesTexto.push(`${item.m_inicio} a ${item.m_fin}hs`);
                    rangosLogicos.push([...parsearHora(item.m_inicio), ...parsearHora(item.m_fin)]);
                }
                if (item.t_inicio && item.t_fin && item.t_inicio.toString() !== "") {
                    partesTexto.push(`${item.t_inicio} a ${item.t_fin}hs`);
                    rangosLogicos.push([...parsearHora(item.t_inicio), ...parsearHora(item.t_fin)]);
                }
                
                textoVisual = partesTexto.length > 0 ? partesTexto.join('<br>') : "Cerrado";
            }

            const li = document.createElement('li');
            li.setAttribute('data-dia', diaIndex);
            
            const hoyIndex = new Date().getDay();
            let etiquetaHoy = "";
            
            if(diaIndex === hoyIndex) {
                li.classList.add('dia-actual');
                etiquetaHoy = `<span class="badge-hoy">HOY</span>`;
            }

            li.innerHTML = `
                <div class="horario-dia">${diaRaw} ${etiquetaHoy}</div> 
                <div class="horario-hora">${textoVisual}</div>
            `;
            listaHorariosUL.appendChild(li);

            const cerradoBooleano = (item.cerrado === true || String(item.cerrado).toUpperCase() === "SI");
            if (diaIndex !== undefined && !cerradoBooleano && rangosLogicos.length > 0) {
                horariosActivos[diaIndex] = rangosLogicos;
            }
        });

        verificarEstadoNegocio();

    } catch (error) {
        console.error("Error cargando horarios:", error);
        listaHorariosUL.innerHTML = '<li style="color:var(--rojo-cerrado); text-align:center; display:block; border:none;">Error al cargar horarios.</li>';
        horariosActivos = {};
        verificarEstadoNegocio();
    }
}

function verificarEstadoNegocio() {
    const ahora = new Date();
    const diaSemana = ahora.getDay(); 
    const horaActual = ahora.getHours();
    const minActual = ahora.getMinutes();
    const tiempoActual = horaActual * 60 + minActual;

    if(listaHorariosUL.children.length > 0) {
        Array.from(listaHorariosUL.children).forEach(li => {
            li.classList.remove('dia-actual');
            const diaDiv = li.querySelector('.horario-dia');
            if(diaDiv) {
                const badge = diaDiv.querySelector('.badge-hoy');
                if(badge) badge.remove();
            }
        });
        const liHoy = listaHorariosUL.querySelector(`li[data-dia="${diaSemana}"]`);
        if(liHoy) {
            liHoy.classList.add('dia-actual');
            const diaDiv = liHoy.querySelector('.horario-dia');
            if(diaDiv && !diaDiv.querySelector('.badge-hoy')) {
                 diaDiv.innerHTML += `<span class="badge-hoy">HOY</span>`;
            }
        }
    }

    const rangosHoy = horariosActivos[diaSemana];
    let estaAbierto = false;

    if (rangosHoy && rangosHoy.length > 0) {
        for (let rango of rangosHoy) {
            const inicio = rango[0] * 60 + rango[1];
            const fin = rango[2] * 60 + rango[3];
            if (tiempoActual >= inicio && tiempoActual < fin) {
                estaAbierto = true;
                break;
            }
        }
    }
    
    negocioAbierto = estaAbierto;
    
    if (negocioAbierto) {
        indicadorEstado.textContent = "Abierto";
        indicadorEstado.classList.remove('cerrado');
        btnVerCarrito.classList.remove('deshabilitado');
    } else {
        indicadorEstado.textContent = "Cerrado";
        indicadorEstado.classList.add('cerrado');
    }
    actualizarBotonesProductos();
}

function actualizarBotonesProductos() {
    document.querySelectorAll('.btn-agregar').forEach(btn => {
        if(btn.closest('#modal-horarios')) return;
        const prod = productos.find(p => p.id == btn.dataset.id);
        if(!negocioAbierto) { btn.disabled=true; btn.textContent="Cerrado"; }
        else if(prod && prod.stock>0) { btn.disabled=false; btn.textContent="🛒 Agregar"; }
        else { btn.disabled=true; btn.textContent="Sin Stock"; }
    });
}

// --- CARGA DE PRODUCTOS ---
async function cargarProductosRemotos() {
    loading.style.display = 'block';
    try {
        const resp = await fetch(URL_SHEET_PRODUCTS);
        const data = await resp.json();
        if(data.ok && data.productos) {
            productos = data.productos.map(p => ({
                id: Number(p.id) || Date.now()+Math.random(),
                nombre: p.nombre, precio: Number(p.precio),
                categoria: (p.categoria || 'varios').toLowerCase().trim(),
                img: (p.img && p.img.startsWith('http')) ? p.img : '',
                stock: p.stock!=null?Number(p.stock):999, promocion: !!p.promocion
            }));
        } else throw new Error();
    } catch(e) {
        errorMsg.style.display='block';
        productos = [{id:1,nombre:'Docena de Facturas (Demo)',precio:4500,categoria:'panadería',stock:10}];
    } finally {
        loading.style.display='none';
        inicializarCategorias();
        filtrarPorCategoria('todos');
        
        cargarHorariosRemotos();
        
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) { carrito = JSON.parse(saved); actualizarCarritoUI(); }
    }
}

// --- LOGICA DE CATEGORIAS ---
function inicializarCategorias() {
    const cats = new Set(productos.map(p => p.categoria));
    const catsOrdenadas = Array.from(cats).sort();

    categoriasLista.innerHTML = `<li><a href="#" data-categoria="todos" class="activo">Todas</a></li>`;
    if(productos.some(p=>p.promocion)) categoriasLista.innerHTML += `<li><a href="#" data-categoria="promocion">🔥 Ofertas</a></li>`;
    
    selectCategoria.innerHTML = `<option value="todos">Todas las categorías</option>`;
    if(productos.some(p=>p.promocion)) selectCategoria.innerHTML += `<option value="promocion">🔥 Ofertas</option>`;

    catsOrdenadas.forEach(cat => {
        if(!['promocion','todos',''].includes(cat)) {
            const nombreCat = cat.charAt(0).toUpperCase() + cat.slice(1);
            categoriasLista.innerHTML += `<li><a href="#" data-categoria="${cat}">${nombreCat}</a></li>`;
            const option = document.createElement('option');
            option.value = cat;
            option.text = nombreCat;
            selectCategoria.appendChild(option);
        }
    });

    categoriasLista.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', e => {
            e.preventDefault();
            const cat = a.dataset.categoria;
            selectCategoria.value = cat; 
            filtrarPorCategoria(cat);
        });
    });

    selectCategoria.addEventListener('change', (e) => {
        filtrarPorCategoria(e.target.value);
    });
}

function filtrarPorCategoria(cat) {
    categoriasLista.querySelectorAll('a').forEach(a => {
        a.classList.toggle('activo', a.dataset.categoria === cat);
    });
    buscador.value = ''; 
    if(cat==='todos') renderizarProductos(productos);
    else if(cat==='promocion') renderizarProductos(productos.filter(p=>p.promocion));
    else renderizarProductos(productos.filter(p=>p.categoria===cat));
}

// Buscador
buscador.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    selectCategoria.value = 'todos'; 
    categoriasLista.querySelectorAll('a').forEach(x => x.classList.remove('activo'));
    if(!term) renderizarProductos(productos);
    else renderizarProductos(productos.filter(p => p.nombre.toLowerCase().includes(term)));
});

function renderizarProductos(lista) {
    productosContainer.innerHTML = '';
    if(!lista.length) { productosContainer.innerHTML = '<p style="width:100%; text-align:center; color:var(--texto-secundario); font-weight:bold;">No hay productos en esta categoría.</p>'; return; }
    
    lista.forEach(p => {
        const div = document.createElement('div');
        div.className = `producto-card ${p.img?'':'sin-imagen'}`;
        div.innerHTML = `
            ${p.promocion?'<div class="cinta-oferta">OFERTA</div>':''}
            ${p.img?`<img src="${p.img}" loading="lazy">`:''}
            <h3>${p.nombre}</h3>
            <span class="precio">${formatPrice(p.precio)}</span>
            <button class="btn-agregar" data-id="${p.id}">Cargando...</button>
        `;
        productosContainer.appendChild(div);
    });
    actualizarBotonesProductos();
    document.querySelectorAll('.btn-agregar').forEach(btn => btn.addEventListener('click', ()=> agregarAlCarrito(productos.find(p=>p.id==btn.dataset.id))));
}

// --- Carrito ---
function agregarAlCarrito(p) {
    if(!p) return;
    const item = carrito.find(x => x.id === p.id);
    if(item) {
        if(item.cantidad < p.stock) item.cantidad++;
        else return showToast("Stock máximo alcanzado");
    } else {
        carrito.push({...p, cantidad:1});
    }
    showToast(`Añadido: ${p.nombre}`);
    btnVerCarrito.classList.add('pop'); setTimeout(()=>btnVerCarrito.classList.remove('pop'),300);
    actualizarCarritoUI();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(carrito));
}

function actualizarCarritoUI() {
    modalCarritoItemsContainer.innerHTML = '';
    let total = 0;
    if(!carrito.length) {
        modalCarritoItemsContainer.innerHTML = '<p style="text-align:center; color:var(--texto-secundario); font-weight:600;">El carrito está vacío</p>';
        btnVaciar.style.display='none'; btnEnviarPedido.disabled=true;
    } else {
        btnVaciar.style.display='block'; btnEnviarPedido.disabled=false;
    }

    carrito.forEach(item => {
        total += item.precio * item.cantidad;
        const div = document.createElement('div');
        div.className = 'modal-carrito-item';
        div.innerHTML = `
            <div style="flex:1"><b style="color:var(--coffee);">${item.nombre}</b><br><small style="color:var(--texto-secundario); font-weight:700;">${formatPrice(item.precio)}</small></div>
            <div class="controles-cantidad">
                <button class="btn-cantidad" data-id="${item.id}" data-op="-">-</button>
                <span>${item.cantidad}</span>
                <button class="btn-cantidad" data-id="${item.id}" data-op="+">+</button>
            </div>
            <div style="width:80px; text-align:right; font-weight:800; color:var(--crust-gold);">${formatPrice(item.precio*item.cantidad)}</div>
        `;
        modalCarritoItemsContainer.appendChild(div);
    });
    totalHeader.textContent = formatPrice(total);
    modalTotal.textContent = formatPrice(total);

    modalCarritoItemsContainer.querySelectorAll('.btn-cantidad').forEach(b => {
        b.addEventListener('click', () => {
            const it = carrito.find(x=>x.id==b.dataset.id);
            if(b.dataset.op === '+') { if(it.cantidad < it.stock) it.cantidad++; }
            else { it.cantidad--; if(it.cantidad<=0) carrito = carrito.filter(x=>x.id!==it.id); }
            actualizarCarritoUI();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(carrito));
        });
    });
}
btnVaciar.addEventListener('click', ()=> { if(confirm('¿Vaciar el carrito?')) { carrito=[]; actualizarCarritoUI(); localStorage.removeItem(STORAGE_KEY); } });

// Modales y Envio
btnVerCarrito.addEventListener('click', ()=> modal.classList.add('visible'));
document.getElementById('btn-cerrar-modal').addEventListener('click', ()=> modal.classList.remove('visible'));
document.getElementById('btn-abrir-horarios').addEventListener('click', ()=> modalHorarios.classList.add('visible'));
document.getElementById('btn-cerrar-horarios').addEventListener('click', ()=> modalHorarios.classList.remove('visible'));

btnEnviarPedido.addEventListener('click', (e) => {
    e.preventDefault();
    verificarEstadoNegocio();
    if(!negocioAbierto) return alert("La panadería está cerrada en este momento.");
    
    const nom = formCliente.querySelector('#nombre').value;
    const cel = formCliente.querySelector('#celular').value;
    if(!nom || !cel) return alert("Por favor, completá tus datos");
    if(!carrito.length) return alert("El carrito está vacío");

    const total = carrito.reduce((a,b)=>a+b.precio*b.cantidad,0);
    const detalle = carrito.map(i=>`${i.cantidad}x ${i.nombre}`).join(' | ');

    btnEnviarPedido.textContent = "Procesando Pedido...";
    
    // Registro Sheets
    fetch(URL_SHEET_REGISTRO, { method:'POST', mode:'cors', body: JSON.stringify({negocio_id:negocioActual, nombre_cliente:nom, celular_cliente:cel, detalle_compra:detalle, total:total}) }).catch(console.error);

    setTimeout(() => {
        const msg = `¡Hola El Buen Trigo! Soy *${nom}*. Quiero encargar:%0A${carrito.map(i=>`▪ ${i.cantidad}x ${i.nombre}`).join('%0A')}%0A*Total: ${formatPrice(total)}*`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
        carrito=[]; localStorage.removeItem(STORAGE_KEY); actualizarCarritoUI();
        modal.classList.remove('visible');
        btnEnviarPedido.textContent = "Enviar Pedido a WhatsApp";
    }, 1000);
});

// Init
cargarProductosRemotos();
setInterval(verificarEstadoNegocio, 60000);

});
</script>
